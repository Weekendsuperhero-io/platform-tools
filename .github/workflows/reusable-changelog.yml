# Reusable workflow: Generate changelog entries using Jules AI
#
# Usage in a consuming repo:
#
# ```yaml
# name: Update Changelog
# on:
#   workflow_dispatch:
#   schedule:
#     - cron: "0 0 * * 1"  # every Monday
#
# jobs:
#   changelog:
#     permissions:
#       contents: write
#     uses: <owner>/<repo>/.github/workflows/reusable-changelog.yml@main
#     with:
#       changelog-path: CHANGELOG.md          # optional
#       pr-branch-prefix: "chore/changelog-"  # optional
#     secrets: inherit
# ```

name: Reusable Changelog

on:
  workflow_call:
    inputs:
      changelog-path:
        description: "Path to the CHANGELOG file"
        type: string
        required: false
        default: "CHANGELOG.md"
      pr-branch-prefix:
        description: "Prefix for the branch created by this workflow"
        type: string
        required: false
        default: "chore/update-changelog"
      diff-file-patterns:
        description: "Space-separated glob patterns for files to include in the diff"
        type: string
        required: false
        default: "'*.rs' '*.ts' '*.tsx' '*.toml' '*.sql' '*.yml' '*.sh' '*.css'"
      diff-exclude-patterns:
        description: "Space-separated patterns to exclude from the diff"
        type: string
        required: false
        default: ":!pnpm-lock.yaml :!Cargo.lock ':!**/bindings/*.ts'"
      max-diff-lines:
        description: "Maximum lines of code diff to send to Jules"
        type: number
        required: false
        default: 4000
      max-commit-messages:
        description: "Maximum number of commit messages to include"
        type: number
        required: false
        default: 50
      fallback-commit-count:
        description: "Number of commits to use when no previous changelog entry exists"
        type: number
        required: false
        default: 20
      unreleased-heading:
        description: "The heading in the changelog that marks new entries"
        type: string
        required: false
        default: "## [Unreleased]"
      custom-prompt:
        description: "Override the default prompt (leave empty to use built-in)"
        type: string
        required: false
        default: ""
      pr-title:
        description: "Title for the generated PR"
        type: string
        required: false
        default: "docs: update CHANGELOG.md"
      pr-body-template:
        description: "Body for the generated PR (use {0} for commit count interpolation)"
        type: string
        required: false
        default: |
          Automated changelog update covering **{0} commits** since the last changelog entry.

          Generated by [Agent](https://weekendsuperhero.io) from full commit messages.
    secrets:
      JULES_API_KEY:
        required: true
      JULES_PR_CLIENT_ID:
        required: false
      JULES_PR_PRIVATE_KEY:
        required: false

jobs:
  changelog:
    name: Generate Changelog PR
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Validate GitHub App secret configuration
        id: app-auth-config
        shell: bash
        env:
          JULES_APP_ID: ${{ secrets.JULES_PR_CLIENT_ID }}
          JULES_APP_KEY: ${{ secrets.JULES_PR_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if { [ -n "${JULES_APP_ID}" ] && [ -z "${JULES_APP_KEY}" ]; } || { [ -z "${JULES_APP_ID}" ] && [ -n "${JULES_APP_KEY}" ]; }; then
            echo "::error::Set both JULES_PR_CLIENT_ID and JULES_PR_PRIVATE_KEY, or neither."
            exit 1
          fi

          ENABLED=false
          if [ -n "${JULES_APP_ID}" ] && [ -n "${JULES_APP_KEY}" ]; then
            ENABLED=true
          fi
          echo "enabled=${ENABLED}" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        if: steps.app-auth-config.outputs.enabled == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.JULES_PR_CLIENT_ID }}
          private-key: ${{ secrets.JULES_PR_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get GitHub App bot identity
        if: steps.app-token.outputs.token != ''
        id: app-bot
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail

          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          BOT_NAME="${APP_SLUG}[bot]"
          BOT_EMAIL="${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

          echo "name=$BOT_NAME" >> "$GITHUB_OUTPUT"
          echo "email=$BOT_EMAIL" >> "$GITHUB_OUTPUT"
          echo "identity=${BOT_NAME} <${BOT_EMAIL}>" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          fetch-depth: 0

      - name: Find changes since last changelog update
        id: changes
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
          FALLBACK_COUNT: ${{ inputs.fallback-commit-count }}
          MAX_COMMITS: ${{ inputs.max-commit-messages }}
        run: |
          set -euo pipefail

          LAST_CHANGELOG_SHA=$(git log -1 --format='%H' -- "$CHANGELOG_PATH" 2>/dev/null || echo "")

          if [ -z "$LAST_CHANGELOG_SHA" ]; then
            echo "No previous CHANGELOG commit found — using last $FALLBACK_COUNT commits"
            LAST_CHANGELOG_SHA=$(git log --skip="$FALLBACK_COUNT" -1 --format='%H')
          fi

          echo "Last changelog commit: $LAST_CHANGELOG_SHA"
          echo "last_sha=$LAST_CHANGELOG_SHA" >> "$GITHUB_OUTPUT"

          git log -n "$MAX_COMMITS" "$LAST_CHANGELOG_SHA"..HEAD \
            --no-merges \
            --date=iso-strict \
            --format='=== COMMIT ===%nHash: %H%nAuthor: %an <%ae>%nDate: %ad%nSubject: %s%nBody:%n%b%n' \
            -- ":!$CHANGELOG_PATH" \
            > /tmp/commits.txt

          COMMIT_COUNT=$(grep -c '^=== COMMIT ===$' /tmp/commits.txt || true)
          echo "Found $COMMIT_COUNT commits since last changelog update"
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No new commits — nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        if: steps.changes.outputs.skip != 'true'
        id: build-prompt
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
          CUSTOM_PROMPT: ${{ inputs.custom-prompt }}
        run: |
          set -euo pipefail

          if [ -n "$CUSTOM_PROMPT" ]; then
            cat > /tmp/prompt.txt << 'EOF'
          EOF
            echo "$CUSTOM_PROMPT" >> /tmp/prompt.txt
          else
            head -60 "$CHANGELOG_PATH" > /tmp/current_changelog.txt

            cat > /tmp/prompt.txt << 'HEREDOC_END'
          You are updating a CHANGELOG.md that follows Keep a Changelog (https://keepachangelog.com/en/1.1.0/).

          Based on the full commit messages below, generate ONLY the new entries to add under ## [Unreleased].
          Group changes into the appropriate sections: ### Added, ### Changed, ### Fixed, ### Removed, ### Security.
          Only include sections that have entries. Each bullet should be bold-titled with a dash description.

          Match this format exactly (from the existing changelog):
          - **Feature name** — description of what changed and why.

          Output ONLY the markdown sections (### Added, ### Changed, etc.) with their bullets.
          No preamble. No ## [Unreleased] header. No explanation.

          === CURRENT CHANGELOG FORMAT (for reference) ===
          HEREDOC_END

            cat /tmp/current_changelog.txt >> /tmp/prompt.txt
          fi

          echo "" >> /tmp/prompt.txt
          echo "=== FULL COMMITS ===" >> /tmp/prompt.txt
          cat /tmp/commits.txt >> /tmp/prompt.txt

          PROMPT_CONTENT=$(cat /tmp/prompt.txt)
          echo "prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT_CONTENT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry with Jules
        if: steps.changes.outputs.skip != 'true'
        id: jules
        uses: weekendsuperhero-io/platform-tools/.github/actions/jules-ai@main
        with:
          title: "Changelog Update"
          jules_api_key: ${{ secrets.JULES_API_KEY }}

      - name: Patch changelog
        if: steps.changes.outputs.skip != 'true'
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
          UNRELEASED: ${{ inputs.unreleased-heading }}
          NEW_ENTRIES: ${{ steps.jules.outputs.response }}
        run: |
          set -euo pipefail

          if [ -z "$NEW_ENTRIES" ]; then
            echo "::error::No output from Jules"
            exit 1
          fi

          awk -v entries="$NEW_ENTRIES" -v heading="$UNRELEASED" '
            $0 == heading {
              print $0
              print ""
              print entries
              next
            }
            { print }
          ' "$CHANGELOG_PATH" > /tmp/changelog_new.md

          mv /tmp/changelog_new.md "$CHANGELOG_PATH"

          echo "=== Updated changelog (first 40 lines) ==="
          head -40 "$CHANGELOG_PATH"

      - name: Create Pull Request
        if: steps.changes.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          author: ${{ steps.app-bot.outputs.identity || 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>' }}
          committer: ${{ steps.app-bot.outputs.identity || 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>' }}
          commit-message: "docs: update CHANGELOG.md"
          title: ${{ inputs.pr-title }}
          body: ${{ format(inputs.pr-body-template, steps.changes.outputs.commit_count) }}
          branch: "${{ inputs.pr-branch-prefix }}${{ github.run_id }}"
          add-paths: ${{ inputs.changelog-path }}
