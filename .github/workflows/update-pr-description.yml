# Thin shim — delegates to the reusable workflow.
# See .github/README.md for configuration options.

name: Update PR Description with Jules

on:
  pull_request:
    types: [opened, edited]

jobs:
  update-pr:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-pr-description.yml
    with:
      trigger-phrase: "@agent pr-title"
    secrets: inherit
