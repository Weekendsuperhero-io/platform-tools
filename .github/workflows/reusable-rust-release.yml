name: Reusable Rust Release

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: "Rust toolchain version (for example: stable, 1.94.0)"
        type: string
        required: false
        default: stable
      manifest-path:
        description: Path to Cargo.toml used to resolve default binary name
        type: string
        required: false
        default: Cargo.toml
      binary-name:
        description: Optional explicit binary base name (without .exe)
        type: string
        required: false
        default: ""
      rust-cache-provider:
        description: Rust cache backend for Swatinem/rust-cache (github or warpbuild)
        type: string
        required: false
        default: github
      validate-runs-on:
        description: Runner used for validate job
        type: string
        required: false
        default: ubuntu-latest
      validate-linux-packages:
        description: apt packages to install during validation (Linux only)
        type: string
        required: false
        default: ""
      validate-fmt-command:
        description: Formatting check command
        type: string
        required: false
        default: cargo fmt --all -- --check
      validate-clippy-command:
        description: Clippy command
        type: string
        required: false
        default: cargo clippy --all-targets --all-features -- -D warnings
      validate-test-command:
        description: Test command
        type: string
        required: false
        default: cargo test --all-features
      validate-build-command:
        description: Optional build command for validate job (empty to skip)
        type: string
        required: false
        default: ""
      binary-matrix-json:
        description: >
          JSON matrix for release builds.
          Required keys per item: os, target.
          Recommended key: name.
          Optional keys: binary, archive, cargo_args.
        type: string
        required: false
        default: "[]"
      build-linux-packages:
        description: apt packages to install during build jobs (Linux only)
        type: string
        required: false
        default: ""
      build-matrix-default-cargo-args:
        description: Default extra args used when matrix item omits cargo_args
        type: string
        required: false
        default: --release
      enable-macos-universal:
        description: Build macOS universal binary from two uploaded artifacts
        type: boolean
        required: false
        default: false
      macos-universal-binary:
        description: Optional binary filename to combine with lipo (defaults to resolved binary name)
        type: string
        required: false
        default: ""
      macos-universal-arm64-artifact:
        description: Artifact name containing arm64 binary archive
        type: string
        required: false
        default: macos-aarch64
      macos-universal-arm64-archive:
        description: Optional archive filename inside arm64 artifact (defaults to <binary>-<arm64 artifact>.tar.gz)
        type: string
        required: false
        default: ""
      macos-universal-x86_64-artifact:
        description: Artifact name containing x86_64 binary archive
        type: string
        required: false
        default: macos-x86_64
      macos-universal-x86_64-archive:
        description: Optional archive filename inside x86_64 artifact (defaults to <binary>-<x86 artifact>.tar.gz)
        type: string
        required: false
        default: ""
      macos-universal-output-archive:
        description: Optional output archive filename (defaults to <binary>-macos-universal.tar.gz)
        type: string
        required: false
        default: ""
      macos-universal-artifact-name:
        description: Artifact name for uploaded universal archive
        type: string
        required: false
        default: macos-universal
      create-github-release:
        description: Create GitHub release and upload collected assets
        type: boolean
        required: false
        default: true
      release-assets-glob:
        description: >
          Optional newline-separated glob patterns (filename-only, relative to artifacts dir)
          used to filter release assets. Empty means *.tar.gz and *.zip.
        type: string
        required: false
        default: ""
      generate-release-notes:
        description: Enable GitHub generated release notes
        type: boolean
        required: false
        default: true
      release-name:
        description: Optional release name override (empty uses tag)
        type: string
        required: false
        default: ""
      release-draft:
        description: Create draft release
        type: boolean
        required: false
        default: false
      release-prerelease:
        description: Mark release as prerelease
        type: boolean
        required: false
        default: false
      publish-crates-io:
        description: Publish crate after validation
        type: boolean
        required: false
        default: false
      publish-runs-on:
        description: Runner used for crates.io publish job
        type: string
        required: false
        default: ubuntu-latest
      publish-linux-packages:
        description: apt packages to install before publish (Linux only)
        type: string
        required: false
        default: ""
      update-lockfile:
        description: Run cargo generate-lockfile before publish
        type: boolean
        required: false
        default: true
      cargo-publish-command:
        description: Cargo publish command (for example cargo publish -p mycrate)
        type: string
        required: false
        default: cargo publish
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false
      JULES_PR_CLIENT_ID:
        required: false
      JULES_PR_PRIVATE_KEY:
        required: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-binary:
    name: Resolve binary name
    runs-on: ubuntu-latest
    outputs:
      binary-name: ${{ steps.resolve.outputs.binary_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve binary name
        id: resolve
        shell: bash
        env:
          INPUT_BINARY_NAME: ${{ inputs.binary-name }}
          MANIFEST_PATH: ${{ inputs.manifest-path }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_BINARY_NAME" ]; then
            echo "binary_name=$INPUT_BINARY_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - <<'PY'
          import os
          import sys
          import tomllib

          manifest_path = os.environ["MANIFEST_PATH"]
          with open(manifest_path, "rb") as f:
            data = tomllib.load(f)

          bins = data.get("bin", [])
          bin_names = [b.get("name") for b in bins if isinstance(b, dict) and b.get("name")]

          if len(bin_names) > 1:
            print(
              "::error::Multiple [[bin]] entries found in Cargo.toml. "
              "Set workflow input 'binary-name' explicitly.",
              file=sys.stderr,
            )
            sys.exit(1)

          if len(bin_names) == 1:
            resolved = bin_names[0]
          else:
            pkg = data.get("package", {})
            resolved = pkg.get("name")
            if not resolved:
              print(
                "::error::Could not resolve binary name from Cargo.toml. "
                "Set workflow input 'binary-name' explicitly.",
                file=sys.stderr,
              )
              sys.exit(1)

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as out:
            out.write(f"binary_name={resolved}\n")
          PY

  validate:
    name: Validate Release
    runs-on: ${{ inputs.validate-runs-on }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: rustfmt,clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-release-validate-${{ runner.os }}
          cache-provider: ${{ inputs.rust-cache-provider }}
          cache-on-failure: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && inputs.validate-linux-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.validate-linux-packages }}

      - name: Check formatting
        run: ${{ inputs.validate-fmt-command }}

      - name: Run clippy
        run: ${{ inputs.validate-clippy-command }}

      - name: Run tests
        run: ${{ inputs.validate-test-command }}

      - name: Optional validate build
        if: inputs.validate-build-command != ''
        run: ${{ inputs.validate-build-command }}

  build-binaries:
    name: Build (${{ matrix.name || matrix.target }})
    if: inputs.binary-matrix-json != '[]'
    needs:
      - validate
      - resolve-binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.binary-matrix-json) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-release-build-${{ matrix.os }}-${{ matrix.target }}
          cache-provider: ${{ inputs.rust-cache-provider }}
          cache-on-failure: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && inputs.build-linux-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.build-linux-packages }}

      - name: Build release binary
        run: cargo build --target ${{ matrix.target }} ${{ matrix.cargo_args || inputs.build-matrix-default-cargo-args }}

      - name: Resolve artifact metadata
        id: artifact
        shell: bash
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
          MATRIX_ARCHIVE: ${{ matrix.archive }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_TARGET: ${{ matrix.target }}
          BASE_BINARY: ${{ needs.resolve-binary.outputs.binary-name }}
        run: |
          set -euo pipefail

          BINARY="$MATRIX_BINARY"
          if [ -z "$BINARY" ]; then
            BINARY="$BASE_BINARY"
            if [ "${{ runner.os }}" = "Windows" ]; then
              BINARY="${BINARY}.exe"
            fi
          fi

          SUFFIX="$MATRIX_NAME"
          if [ -z "$SUFFIX" ]; then
            SUFFIX="$MATRIX_TARGET"
          fi

          ARCHIVE="$MATRIX_ARCHIVE"
          if [ -z "$ARCHIVE" ]; then
            if [ "${{ runner.os }}" = "Windows" ]; then
              ARCHIVE="${BASE_BINARY}-${SUFFIX}.zip"
            else
              ARCHIVE="${BASE_BINARY}-${SUFFIX}.tar.gz"
            fi
          fi

          ARTIFACT_NAME="$MATRIX_NAME"
          if [ -z "$ARTIFACT_NAME" ]; then
            ARTIFACT_NAME="$MATRIX_TARGET"
          fi

          echo "binary=$BINARY" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../${{ steps.artifact.outputs.archive }}" "${{ steps.artifact.outputs.binary }}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ steps.artifact.outputs.binary }}" -DestinationPath "${{ steps.artifact.outputs.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ steps.artifact.outputs.archive }}

  build-macos-universal:
    name: Build (macos-universal)
    if: inputs.enable-macos-universal
    needs:
      - build-binaries
      - resolve-binary
    runs-on: macos-latest

    steps:
      - name: Resolve universal artifact metadata
        id: universal
        shell: bash
        env:
          INPUT_BINARY: ${{ inputs.macos-universal-binary }}
          INPUT_ARM64_ARCHIVE: ${{ inputs.macos-universal-arm64-archive }}
          INPUT_X86_ARCHIVE: ${{ inputs.macos-universal-x86_64-archive }}
          INPUT_OUTPUT_ARCHIVE: ${{ inputs.macos-universal-output-archive }}
          ARM64_ARTIFACT: ${{ inputs.macos-universal-arm64-artifact }}
          X86_ARTIFACT: ${{ inputs.macos-universal-x86_64-artifact }}
          RESOLVED_BINARY: ${{ needs.resolve-binary.outputs.binary-name }}
        run: |
          set -euo pipefail

          for value in "$ARM64_ARTIFACT" "$X86_ARTIFACT"; do
            if [ -z "$value" ]; then
              echo "::error::Universal build input is missing"
              exit 1
            fi
          done

          BINARY="$INPUT_BINARY"
          if [ -z "$BINARY" ]; then
            BINARY="$RESOLVED_BINARY"
          fi

          if [ -z "$BINARY" ]; then
            echo "::error::Could not resolve macOS universal binary name"
            exit 1
          fi

          ARM64_ARCHIVE="$INPUT_ARM64_ARCHIVE"
          if [ -z "$ARM64_ARCHIVE" ]; then
            ARM64_ARCHIVE="${BINARY}-${ARM64_ARTIFACT}.tar.gz"
          fi

          X86_ARCHIVE="$INPUT_X86_ARCHIVE"
          if [ -z "$X86_ARCHIVE" ]; then
            X86_ARCHIVE="${BINARY}-${X86_ARTIFACT}.tar.gz"
          fi

          OUTPUT_ARCHIVE="$INPUT_OUTPUT_ARCHIVE"
          if [ -z "$OUTPUT_ARCHIVE" ]; then
            OUTPUT_ARCHIVE="${BINARY}-macos-universal.tar.gz"
          fi

          echo "binary=$BINARY" >> "$GITHUB_OUTPUT"
          echo "arm64_artifact=$ARM64_ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "arm64_archive=$ARM64_ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "x86_artifact=$X86_ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "x86_archive=$X86_ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "output_archive=$OUTPUT_ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create universal binary
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p work
          cd work

          tar xzf "../artifacts/${{ steps.universal.outputs.arm64_artifact }}/${{ steps.universal.outputs.arm64_archive }}"
          mv "${{ steps.universal.outputs.binary }}" "${{ steps.universal.outputs.binary }}-arm64"

          tar xzf "../artifacts/${{ steps.universal.outputs.x86_artifact }}/${{ steps.universal.outputs.x86_archive }}"
          mv "${{ steps.universal.outputs.binary }}" "${{ steps.universal.outputs.binary }}-x86_64"

          lipo -create \
            -output "${{ steps.universal.outputs.binary }}" \
            "${{ steps.universal.outputs.binary }}-arm64" \
            "${{ steps.universal.outputs.binary }}-x86_64"

          file "${{ steps.universal.outputs.binary }}"
          tar czf "../${{ steps.universal.outputs.output_archive }}" "${{ steps.universal.outputs.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.macos-universal-artifact-name }}
          path: ${{ steps.universal.outputs.output_archive }}

  create-release:
    name: Create GitHub Release
    if: |
      inputs.create-github-release &&
      always() &&
      needs.build-binaries.result == 'success' &&
      (needs.build-macos-universal.result == 'success' || needs.build-macos-universal.result == 'skipped')
    needs:
      - build-binaries
      - build-macos-universal
    runs-on: ubuntu-latest

    steps:
      - name: Validate release auth inputs
        id: release-auth
        shell: bash
        env:
          APP_ID: ${{ secrets.JULES_PR_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.JULES_PR_PRIVATE_KEY }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          set -euo pipefail

          has_app_id=false
          has_private_key=false

          if [ -n "$APP_ID" ]; then
            has_app_id=true
          fi
          if [ -n "$APP_PRIVATE_KEY" ]; then
            has_private_key=true
          fi

          if [ "$has_app_id" = true ] && [ "$has_private_key" = true ]; then
            echo "use_app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$has_app_id" = false ] && [ "$has_private_key" = false ]; then
            echo "use_app=false" >> "$GITHUB_OUTPUT"
            echo "token=$GITHUB_TOKEN_FALLBACK" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Set both JULES_PR_CLIENT_ID and JULES_PR_PRIVATE_KEY, or neither."
          exit 1

      - name: Create GitHub App token
        id: app-token
        if: steps.release-auth.outputs.use_app == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.JULES_PR_CLIENT_ID }}
          private-key: ${{ secrets.JULES_PR_PRIVATE_KEY }}

      - name: Finalize release token
        id: release-token
        shell: bash
        env:
          USE_APP: ${{ steps.release-auth.outputs.use_app }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          FALLBACK_TOKEN: ${{ steps.release-auth.outputs.token }}
        run: |
          set -euo pipefail

          if [ "$USE_APP" = "true" ]; then
            if [ -z "$APP_TOKEN" ]; then
              echo "::error::Failed to create GitHub App token"
              exit 1
            fi
            echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$FALLBACK_TOKEN" ]; then
            echo "::error::GITHUB_TOKEN fallback is empty"
            exit 1
          fi
          echo "token=$FALLBACK_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        env:
          ASSET_GLOBS: ${{ inputs.release-assets-glob }}
        run: |
          set -euo pipefail

          mkdir -p release

          if [ -n "$ASSET_GLOBS" ]; then
            while IFS= read -r pattern; do
              if [ -z "$pattern" ]; then
                continue
              fi
              find artifacts -type f -name "$pattern" -print -exec cp "{}" release/ \;
            done <<< "$ASSET_GLOBS"
          else
            find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print -exec cp "{}" release/ \;
          fi

          if [ -z "$(ls -A release)" ]; then
            echo "::error::No release assets were collected"
            exit 1
          fi

          ls -lh release/

      - name: Create release (tag name)
        if: inputs.release-name == ''
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.release-token.outputs.token }}
          draft: ${{ inputs.release-draft }}
          prerelease: ${{ inputs.release-prerelease }}
          generate_release_notes: ${{ inputs.generate-release-notes }}
          files: release/*

      - name: Create release (custom name)
        if: inputs.release-name != ''
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.release-token.outputs.token }}
          name: ${{ inputs.release-name }}
          draft: ${{ inputs.release-draft }}
          prerelease: ${{ inputs.release-prerelease }}
          generate_release_notes: ${{ inputs.generate-release-notes }}
          files: release/*

  publish-crates-io:
    name: Publish to crates.io
    if: inputs.publish-crates-io
    needs: validate
    runs-on: ${{ inputs.publish-runs-on }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && inputs.publish-linux-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.publish-linux-packages }}

      - name: Update lockfile
        if: inputs.update-lockfile
        run: cargo generate-lockfile

      - name: Verify crates.io token
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN is required when publish-crates-io is true"
            exit 1
          fi

      - name: Publish crate
        run: ${{ inputs.cargo-publish-command }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
