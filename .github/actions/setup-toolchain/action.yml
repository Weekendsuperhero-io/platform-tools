name: Setup Toolchain
description: Shared setup for Node.js, pnpm, Rust, and frontend dependencies

inputs:
  rust-targets:
    description: Additional Rust targets to install (comma-separated)
    required: false
    default: ""
  rust-components:
    description: Additional Rust components to install (comma-separated)
    required: false
    default: ""
  rust-cache-key:
    description: Cache key prefix for Rust target directory (e.g. "ci", "release", "release-aarch64-pc-windows-msvc")
    required: false
    default: "default"
  skip-frontend:
    description: Skip frontend dependency installation
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Cache pnpm store
      uses: actions/cache@v5
      with:
        path: ~/.pnpm-store
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}
        components: ${{ inputs.rust-components }}

    - name: Cache Rust target directory
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.rust-cache-key }}
        cache-targets: true
        cache-on-failure: true
        cache-all-crates: true
        save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

    - name: Configure Cargo for CI
      shell: bash
      run: |
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
        echo "CARGO_PROFILE_TEST_DEBUG=0" >> "$GITHUB_ENV"

    - name: Install frontend dependencies
      if: inputs.skip-frontend != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
